<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Noise Meter</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        #meter-container { width: 100%; height: 50px; background-color: #ddd; border-radius: 25px; margin: 30px 0; overflow: hidden; border: 2px solid #333; }
        #meter-bar { height: 100%; width: 0%; background-color: #4CAF50; transition: width 0.1s, background-color 0.2s; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 10px; background-color: #007bff; color: white; margin-bottom: 20px;}
        input[type="range"] { width: 80%; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Noise Level Meter</h1>
    <button id="start-btn">Start Listening</button>
    
    <div id="meter-container">
        <div id="meter-bar"></div>
    </div>

    <h3>Sensitivity / Threshold: <span id="threshold-val">50</span>%</h3>
    <input type="range" id="threshold" min="10" max="100" value="50">
    <p>If the noise goes above this limit, the alarm will sound!</p>

    <script>
        let audioContext;
        let analyser;
        let microphone;
        let isListening = false;
        let isRinging = false;
        let threshold = 50;

        const startBtn = document.getElementById('start-btn');
        const meterBar = document.getElementById('meter-bar');
        const thresholdSlider = document.getElementById('threshold');
        const thresholdVal = document.getElementById('threshold-val');

        thresholdSlider.addEventListener('input', function() {
            threshold = this.value;
            thresholdVal.innerText = threshold;
        });

        // Generates an offline "beep" sound
        function playAlarm() {
            if (isRinging) return;
            isRinging = true;
            
            const osc = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioContext.currentTime); // Beep pitch
            
            gainNode.gain.setValueAtTime(1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1); // 1-second beep
            
            osc.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            osc.start();
            osc.stop(audioContext.currentTime + 1);
            
            // Cooldown before it can ring again
            setTimeout(() => { isRinging = false; }, 2000); 
        }

        async function startListening() {
            if (isListening) return;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                
                isListening = true;
                startBtn.innerText = "Listening... (Green is Good)";
                startBtn.style.backgroundColor = "#4CAF50";
                
                checkVolume();
            } catch (err) {
                alert("Microphone access denied or not supported. Please check browser permissions.");
            }
        }

        function checkVolume() {
            if (!isListening) return;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            let averageVolume = sum / dataArray.length;
            
            // Convert to a percentage (roughly)
            let volumePercent = Math.min(100, Math.round((averageVolume / 100) * 100));

            // Update UI
            meterBar.style.width = volumePercent + '%';

            if (volumePercent < threshold * 0.7) {
                meterBar.style.backgroundColor = "#4CAF50"; // Green
            } else if (volumePercent < threshold) {
                meterBar.style.backgroundColor = "#FFC107"; // Yellow
            } else {
                meterBar.style.backgroundColor = "#F44336"; // Red
                playAlarm();
            }

            requestAnimationFrame(checkVolume);
        }

        startBtn.addEventListener('click', startListening);
    </script>
</body>
</html>
